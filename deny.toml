# EasyBot — cargo-deny configuration
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = [
    # rustls-pemfile is unmaintained (RUSTSEC-2025-0134)
    # Pinned by transitive deps (rustls, aws-lc-rs); awaiting upstream migration
    "RUSTSEC-2025-0134",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Unlicense",
    "MPL-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[bans]
multiple-versions = "deny"
skip = []
skip-tree = [
    # larksuite-oapi-sdk-rs pins an older tungstenite — upstream PR needed
    { name = "tokio-tungstenite", version = "0.26" },
    # Duplicate sha2 from transitive deps (argon2 vs others)
    { name = "sha2", version = "0.11" },
    # Duplicate rand/rand_core from transitive deps
    { name = "rand", version = "0.9" },
    { name = "rand_core", version = "0.9" },
    { name = "webpki-roots", version = "0.26" },
    { name = "digest", version = "0.11" },
    { name = "crypto-common", version = "0.2" },
    { name = "block-buffer", version = "0.11" },
]

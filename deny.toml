# EasyBot — cargo-deny configuration
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = [
    # rustls-pemfile is unmaintained (RUSTSEC-2025-0134)
    # Pinned by transitive deps (rustls, aws-lc-rs); awaiting upstream migration
    "RUSTSEC-2025-0134",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Unlicense",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
skip = []
skip-tree = []

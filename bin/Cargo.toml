[package]
name = "easybot-bin"
version.workspace = true
edition.workspace = true

[dependencies]
easybot-core = { path = "../crates/easybot-core" }
easybot-api = { path = "../crates/easybot-api" }
easybot-adapter-telegram = { path = "../crates/easybot-adapter-telegram", optional = true }
easybot-adapter-discord = { path = "../crates/easybot-adapter-discord", optional = true }
easybot-adapter-feishu = { path = "../crates/easybot-adapter-feishu", optional = true }
easybot-adapter-qq = { path = "../crates/easybot-adapter-qq", optional = true }
easybot-adapter-wechat = { path = "../crates/easybot-adapter-wechat", optional = true }

tokio.workspace = true
clap.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde_yaml.workspace = true
serde_json.workspace = true
anyhow.workspace = true
dirs.workspace = true

[features]
default = ["adapter-telegram"]
adapter-telegram = ["easybot-adapter-telegram"]
adapter-discord = ["easybot-adapter-discord"]
adapter-feishu = ["easybot-adapter-feishu"]
adapter-qq = ["easybot-adapter-qq"]
adapter-wechat = ["easybot-adapter-wechat"]
full = ["adapter-telegram", "adapter-discord", "adapter-feishu", "adapter-qq", "adapter-wechat"]
plugin-system = ["easybot-core/plugin-system"]

[[bin]]
name = "easybot"
path = "src/main.rs"

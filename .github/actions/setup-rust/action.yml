name: Setup Rust toolchain
description: >
  Checkout, Rust toolchain, platform-detecting protoc, and smart Rust cache.
  Use as the first step in any job that compiles Rust code.

inputs:
  components:
    description: "Additional Rustup components (e.g., 'clippy, rustfmt')"
    required: false
    default: ""
  target:
    description: "Rust target triple for cross-compilation (e.g., 'aarch64-unknown-linux-gnu')"
    required: false
    default: ""
  install-protoc:
    description: >
      Protoc installation strategy: 'auto', 'linux', 'macos', 'windows',
      or 'none' to skip entirely. The larksuite-oapi-sdk-rs dependency
      (Feishu adapter) requires protoc at build time.
    required: false
    default: "auto"
  install-zigbuild:
    description: "Whether to install cargo-zigbuild for musl cross-compilation (requires Python/pip)"
    required: false
    default: "false"
  # ── Cache control ──
  cache-shared-key:
    description: >
      Stable cache key shared across jobs that compile the same feature set.
      When set, all jobs using the same key share compiled target/ artifacts.
      Leave empty to auto-derive a per-job key (default).
    required: false
    default: ""
  cache-save-if:
    description: >
      Condition string for saving the cache (e.g. "${{ github.ref == 'refs/heads/main' }}").
      Useful to avoid PR branches polluting the shared cache. Default: always save.
    required: false
    default: "true"
  cache-all-crates:
    description: "Cache all crates (not just dependencies). Useful for shared-key scenarios."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: ${{ inputs.components }}
        target: ${{ inputs.target }}

    # ----- protoc (Linux) -----
    - name: Install protoc (Linux apt)
      if: ${{ runner.os == 'Linux' && (inputs.install-protoc == 'auto' || inputs.install-protoc == 'linux') }}
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

    # ----- protoc (macOS) -----
    - name: Install protoc (macOS brew)
      if: ${{ runner.os == 'macOS' && (inputs.install-protoc == 'auto' || inputs.install-protoc == 'macos') }}
      shell: bash
      run: brew install protobuf

    # ----- protoc (Windows) -----
    - name: Install protoc (Windows)
      if: ${{ runner.os == 'Windows' && (inputs.install-protoc == 'auto' || inputs.install-protoc == 'windows') }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ github.token }}

    # ----- cargo-zigbuild (release cross-compilation only) -----
    - name: Install cargo-zigbuild
      if: ${{ inputs.install-zigbuild == 'true' }}
      shell: bash
      run: pip3 install cargo-zigbuild

    # ----- Smart Rust cache (replaces actions/cache + sccache) -----
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.cache-shared-key }}
        save-if: ${{ inputs.cache-save-if }}
        cache-all-crates: ${{ inputs.cache-all-crates }}

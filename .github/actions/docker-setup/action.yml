name: Docker Buildx Setup
description: >
  Set up Docker Buildx, lower-case the repository name, log in to GHCR, and extract
  metadata (tags + labels). Callers access outputs via steps.<id>.outputs.<name>.

inputs:
  registry:
    description: "Container registry hostname"
    required: false
    default: ghcr.io
  tags:
    description: "Metadata tag rules (multi-line, same format as docker/metadata-action)"
    required: false
    default: |
      type=ref,event=branch
      type=semver,pattern={{version}}
      type=semver,pattern={{major}}.{{minor}}
      type=sha,prefix=,suffix=,format=short
      type=raw,value=latest,enable={{is_default_branch}}

outputs:
  lower-repo:
    description: "Lowercase repository name for GHCR"
    value: ${{ steps.lower.outputs.repo }}
  meta-tags:
    description: "Docker metadata tags (newline-separated)"
    value: ${{ steps.meta.outputs.tags }}
  meta-labels:
    description: "Docker metadata labels"
    value: ${{ steps.meta.outputs.labels }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Lowercase repository name for GHCR
      id: lower
      shell: bash
      run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.registry }}/${{ steps.lower.outputs.repo }}
        tags: ${{ inputs.tags }}

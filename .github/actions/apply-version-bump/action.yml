name: Apply version bump
description: >
  Update Cargo.toml version and insta snapshots to match the release version.
  Centralizes the sed commands so they aren't duplicated across jobs.
inputs:
  version:
    description: "The new version string (e.g., 0.1.0)"
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        VERSION="${{ inputs.version }}"

        # ⚠️ Always use sed -i.bak + rm .bak: macOS sed requires backup extension,
        #    Linux sed accepts it without. Portable across all runners.
        # ── Cargo.toml ──
        sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
        rm -f Cargo.toml.bak

        # ── Regenerate Cargo.lock ──
        # After changing Cargo.toml version, the lock file is stale.
        # All downstream build jobs use --locked, so we must update it here.
        cargo generate-lockfile

        # ── insta snapshots (only health response includes version string) ──
        SNAP="crates/easybot-api/tests/snapshots/routes__health_response.snap"
        if [ -f "$SNAP" ]; then
          sed -i.bak 's/"version": ".*"/"version": "'"$VERSION"'"/' "$SNAP"
          rm -f "$SNAP.bak"
        fi

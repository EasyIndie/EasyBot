name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      # Check with all features so plugin-system code & all adapters are validated
      - name: Check
        run: cargo check --workspace --features "full,plugin-system"

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --features "full,plugin-system" --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      # Build and test with default features
      - name: Build
        run: cargo build --workspace

      - name: Test (default features)
        run: cargo test --workspace

      # Build mock-adapter (required by plugin integration tests)
      - name: Build mock-adapter
        run: cargo build -p mock-adapter

      # Test with all adapters + plugin system enabled.
      # Note: e2e tests use wiremock (no real credentials needed).
      - name: Test (full features + plugin-system)
        run: cargo test --workspace --features "full,plugin-system"

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
        continue-on-error: true

      - name: Generate code coverage
        run: cargo tarpaulin --workspace --out xml --engine llvm
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: false

name: CI

on:
  push:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  merge_group:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint: fmt only, no compilation (~20s) ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --all --check

  # ── Test: clippy → build → test (merged check + test-default + test-all) ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          install-protoc: auto
          cache-shared-key: "test-ubuntu"
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy --workspace --features "default,plugin-system" --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --features "default,plugin-system" --locked

      - name: Build mock-adapter
        run: cargo build -p mock-adapter --locked

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Test
        run: cargo nextest run --workspace --features "default,plugin-system" --locked

  # ── Feature matrix: validate edge feature combinations ─────────────
  feature-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - features: "--no-default-features"
            protoc: "none"
          - features: "--no-default-features --features adapter-telegram,adapter-discord"
            protoc: "none"
          - features: "--no-default-features --features adapter-feishu,adapter-qq,adapter-wechat"
            protoc: "auto"
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          install-protoc: ${{ matrix.protoc }}
          cache-shared-key: "feature-check"
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check (${{ matrix.features }})
        run: cargo check --workspace ${{ matrix.features }} --locked

  # ── Cross-platform check (Linux arm64, macOS arm64, Windows x64/arm64) ──
  cross-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: windows-latest
          - os: windows-11-arm
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          install-protoc: auto
          cache-shared-key: cross-check-${{ runner.os }}-${{ runner.arch }}
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check
        run: cargo check --workspace --features "default,plugin-system" --locked

  # ── Code coverage ───────────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          install-protoc: auto

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Build workspace (for integration tests)
        run: cargo build --workspace --features "default,plugin-system" --locked

      - name: Build mock-adapter
        run: cargo build -p mock-adapter --locked

      - name: Generate code coverage
        run: cargo llvm-cov --workspace --features "default,plugin-system" --locked --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Cut release: bump version, update changelog, tag ─────────
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Determine version from Release Drafter
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG=$(gh release list --limit 10 --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' 2>/dev/null | head -1)
          if [ -n "$DRAFT_TAG" ]; then
            echo "version=${DRAFT_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            echo "version=$MAJOR.$MINOR.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: invalid version '$VERSION'"
            exit 1
          fi

      - name: Get Release Drafter body
        id: drafter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_BODY=$(gh release list --limit 10 --json body,isDraft --jq '.[] | select(.isDraft) | .body' 2>/dev/null | head -1)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DRAFT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DRAFT_BODY: ${{ steps.drafter.outputs.body }}
        run: |
          DATE=$(date +%Y-%m-%d)
          NEW_ENTRY="## [$VERSION] - $DATE"
          if [ -n "$DRAFT_BODY" ]; then
            NEW_ENTRY="$NEW_ENTRY\n\n$DRAFT_BODY"
          fi
          sed -i "/^## \[Unreleased\]/a\\\n$NEW_ENTRY" CHANGELOG.md

      - name: Commit and tag locally
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"

      - name: Push tag to origin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git push origin "v$VERSION"

      - name: Upload updated files
        uses: actions/upload-artifact@v7
        with:
          name: updated-files
          path: |
            Cargo.toml
            CHANGELOG.md

  # ── Verify: run full CI checks before releasing ─────────────────
  verify:
    needs: cut-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Apply version bump
        uses: actions/download-artifact@v8
        with:
          name: updated-files
          path: .

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --features "full,plugin-system" --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --features "full,plugin-system" --locked

      - name: Build mock-adapter
        run: cargo build -p mock-adapter --locked

      - name: Test
        run: cargo test --workspace --features "full,plugin-system" --locked

  # ── Cross-compile release binaries ────────────────────────────
  build-binaries:
    needs: cut-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: ".exe"
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Apply version bump
        uses: actions/download-artifact@v8
        with:
          name: updated-files
          path: .

      - name: Install protoc (Linux)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
        if: runner.os == 'Linux'

      - name: Install protoc (Windows)
        uses: arduino/setup-protoc@v3
        if: runner.os == 'Windows'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc (macOS)
        run: brew install protobuf
        if: runner.os == 'macOS'

      - name: Install cross-compilation dependencies (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          # aarch64-linux cross-compilation requires the cross-gcc linker;
          # the default `cc` on x86_64 invokes lld in x86_64 mode and fails
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --features "full,plugin-system" --target ${{ matrix.target }} --locked

      - name: Prepare artifact
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/easybot${{ matrix.suffix }}"
          ARCHIVE="easybot-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$BINARY" "$ARCHIVE"
          echo "sha256=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: easybot-${{ matrix.target }}
          path: easybot-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8

      - name: Generate checksums
        run: |
          cd easybot-x86_64-unknown-linux-gnu && sha256sum easybot-x86_64-unknown-linux-gnu* >> ../checksums.txt
          cd ../easybot-aarch64-unknown-linux-gnu && sha256sum easybot-aarch64-unknown-linux-gnu* >> ../checksums.txt
          cd ../easybot-x86_64-apple-darwin && sha256sum easybot-x86_64-apple-darwin* >> ../checksums.txt
          cd ../easybot-aarch64-apple-darwin && sha256sum easybot-aarch64-apple-darwin* >> ../checksums.txt
          cd ../easybot-x86_64-pc-windows-msvc && sha256sum easybot-x86_64-pc-windows-msvc* >> ../checksums.txt
          cd ../easybot-aarch64-pc-windows-msvc && sha256sum easybot-aarch64-pc-windows-msvc* >> ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.cut-release.outputs.version }}
          name: EasyBot v${{ needs.cut-release.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(needs.cut-release.outputs.version, '-') }}
          files: |
            easybot-*/easybot-*
            checksums.txt

  # ── Build and push Docker image ────────────────────────────────
  # Uses pre-built binaries from build-binaries — skips Rust compilation.
  docker:
    needs: [cut-release, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Download linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: easybot-x86_64-unknown-linux-gnu

      - name: Download linux aarch64 binary
        uses: actions/download-artifact@v8
        with:
          name: easybot-aarch64-unknown-linux-gnu

      - name: Prepare binaries for Docker
        run: |
          mkdir -p dist/
          # download-artifact@v4+ extracts single named artifacts directly (no subdirectory)
          cp easybot-x86_64-unknown-linux-gnu dist/easybot-amd64
          cp easybot-aarch64-unknown-linux-gnu dist/easybot-arm64
          chmod +x dist/easybot-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

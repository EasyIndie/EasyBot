name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Cut release: bump version, tag, push ────────────
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # 用 PAT 提权以绕过分支保护 push 到 main + tag
          # 需先在 https://github.com/settings/tokens 创建 classic PAT (repo 权限)
          # 并添加到仓库 Secrets: GH_RELEASE_PAT
          # 同时将该用户加入分支保护规则集的 bypass_actors
          token: ${{ secrets.GH_RELEASE_PAT || github.token }}

      - name: Determine version
        id: version
        run: |
          CURRENT=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Regenerate Cargo.lock after version bump
        run: cargo generate-lockfile

      - name: Update CHANGELOG.md — add version header under [Unreleased]
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          # CHANGELOG.md 的 [Unreleased] 下方已在日常 PR 中积累了内容，
          # 此处只插入版本号 header，原有内容自动归入此版本
          sed -i "/^## \[Unreleased\]/a\\\n## [$VERSION] - $DATE" CHANGELOG.md

      - name: Update insta snapshots to match new version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SNAP="crates/easybot-api/tests/snapshots/routes__health_response.snap"
          if [ -f "$SNAP" ]; then
            sed -i 's/"version": ".*"/"version": "'"$VERSION"'"/' "$SNAP"
          fi

      - name: Commit, tag, push to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md Cargo.lock \
            crates/easybot-api/tests/snapshots/routes__health_response.snap
          git commit -m "chore: bump version to v$VERSION"
          git tag -f "v$VERSION"
          git push origin main
          git push origin "v$VERSION" --force

      - name: Extract release body from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_body.md

      - name: Upload release body
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: release_body.md

  # ── Verify: run full CI checks before releasing ────
  verify:
    needs: cut-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --features "full,plugin-system" --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --features "full,plugin-system" --locked

      - name: Build mock-adapter
        run: cargo build -p mock-adapter --locked

      - name: Test
        run: cargo test --workspace --features "full,plugin-system" --locked

  # ── Cross-compile release binaries ─────────────────
  build-binaries:
    needs: cut-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: ".exe"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
          install-protoc: auto

      - name: Install cross-compilation dependencies (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --features "full,plugin-system" --target ${{ matrix.target }} --locked

      - name: Prepare artifact
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/easybot${{ matrix.suffix }}"
          ARCHIVE="easybot-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$BINARY" "$ARCHIVE"
          echo "sha256=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easybot-${{ matrix.target }}
          path: easybot-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────
  create-release:
    needs: [build-binaries, cut-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          # Collect sha256 for all platform binaries
          for dir in easybot-*-*; do
            if [ -d "$dir" ]; then
              cd "$dir" && sha256sum easybot-*-* >> ../checksums.txt && cd ..
            fi
          done

      - name: Download release body
        uses: actions/download-artifact@v4
        with:
          name: release-body
          path: .release-body

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.cut-release.outputs.version }}
          name: EasyBot v${{ needs.cut-release.outputs.version }}
          body_path: .release-body/release_body.md
          draft: false
          prerelease: ${{ contains(needs.cut-release.outputs.version, '-') }}
          files: |
            easybot-*/easybot-*
            checksums.txt

  # ── Build and push Docker image ────────────────────
  docker:
    needs: [cut-release, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: easybot-x86_64-unknown-linux-gnu

      - name: Download linux aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: easybot-aarch64-unknown-linux-gnu

      - name: Prepare binaries for Docker
        run: |
          mkdir -p dist/
          cp easybot-x86_64-unknown-linux-gnu dist/easybot-amd64
          cp easybot-aarch64-unknown-linux-gnu dist/easybot-arm64
          chmod +x dist/easybot-*

      - uses: ./.github/actions/docker-setup
        id: docker-prep
        with:
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-prep.outputs.meta-tags }}
          labels: ${{ steps.docker-prep.outputs.meta-labels }}

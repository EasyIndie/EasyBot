name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0); must be pushed to origin first'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Prepare release: extract version from tag, bump files, push to main ──
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          # PAT 提权以绕过分支保护 push 到 main
          # Tag 由开发者本地创建推送，workflow 不创建 tag
          # 需先在 https://github.com/settings/tokens 创建 classic PAT (repo 权限)
          # 并添加到仓库 Secrets: GH_RELEASE_PAT
          # 同时将该用户加入分支保护规则集的 bypass_actors
          token: ${{ secrets.GH_RELEASE_PAT || github.token }}

      - name: Determine version from tag
        id: version
        run: |
          # Extract version from tag name (e.g. v0.1.0 → 0.1.0)
          # Supports both tag push and workflow_dispatch fallback
          if [ -n "${{ github.ref_name }}" ] && [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # workflow_dispatch fallback — use tags input
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid tag format: v$VERSION (expected vX.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: v$VERSION"

      # ── Idempotent version bump steps ──
      # Each step checks if already applied so re-running a failed release is safe.

      - name: Update Cargo.toml version (idempotent)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
            echo "Updated Cargo.toml: $CURRENT → $VERSION"
          else
            echo "Cargo.toml already at $VERSION — skipping"
          fi

      - name: Regenerate Cargo.lock after version bump
        run: cargo generate-lockfile

      - name: Update CHANGELOG.md — add version header (idempotent)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG already has [$VERSION] header — skipping"
          else
            DATE=$(date +%Y-%m-%d)
            sed -i "/^## \[Unreleased\]/a\\\n## [$VERSION] - $DATE" CHANGELOG.md
            echo "Added [$VERSION] - $DATE header to CHANGELOG"
          fi

      - name: Update insta snapshots to match new version (idempotent)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SNAP="crates/easybot-api/tests/snapshots/routes__health_response.snap"
          if [ -f "$SNAP" ]; then
            CURRENT=$(grep -o '"version": "[^"]*"' "$SNAP" | head -1 | sed 's/"version": "\(.*\)"/\1/')
            if [ "$CURRENT" != "$VERSION" ]; then
              sed -i 's/"version": ".*"/"version": "'"$VERSION"'"/' "$SNAP"
              echo "Updated snapshot: $CURRENT → $VERSION"
            else
              echo "Snapshot already at $VERSION — skipping"
            fi
          fi

      # Downstream jobs apply the version bump directly via sed (no patch file),
      # because the tag ref may differ from main by the time they run.

      - name: Extract release body from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_body.md

      - name: Upload release body
        uses: actions/upload-artifact@v7
        with:
          name: release-body
          path: release_body.md

      # Generate easybot-version.json for the auto-update system
      - name: Generate easybot-version.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > easybot-version.json <<'EOF'
          {
            "version": "'"$VERSION"'",
            "tag": "v'"$VERSION"'",
            "release_date": "$(date +%Y-%m-%d)",
            "schema_version": 1,
            "requires_db_migration": false,
            "migrations": [],
            "requires_config_migration": false,
            "config_changes": [],
            "breaking_changes": [],
            "plugin_abi_version": 1,
            "min_upgradable_from": "0.0.10"
          }
          EOF
          echo "Generated easybot-version.json for v$VERSION"

      - name: Upload easybot-version.json
        uses: actions/upload-artifact@v7
        with:
          name: easybot-version
          path: easybot-version.json

      # Commit version bump and push to main (skipped if no changes — re-run safe)
      - name: Commit version bump and push to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md Cargo.lock \
            crates/easybot-api/tests/snapshots/routes__health_response.snap
          if git diff --cached --quiet; then
            echo "No changes to commit — version already at v$VERSION"
          else
            git commit -m "chore: bump version to v$VERSION"
            git fetch origin main
            git rebase origin/main || {
              echo "❌ Rebase conflict — someone modified Cargo.toml/CHANGELOG simultaneously"
              echo "   Please resolve manually and re-run the release"
              exit 1
            }
            git push origin main
          fi

  # ── Verify: run full CI checks before releasing ────
  verify:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/apply-version-bump
        with:
          version: ${{ needs.prepare-release.outputs.version }}

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --features "default,plugin-system" --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --features "default,plugin-system" --locked

      - name: Build mock-adapter
        run: cargo build -p mock-adapter --locked

      - name: Test
        run: cargo test --workspace --features "default,plugin-system" --locked

  # ── Cross-compile release binaries ─────────────────
  build-binaries:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            macos-deployment-target: "10.15"
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            macos-deployment-target: "11.0"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: ".exe"
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - uses: ./.github/actions/apply-version-bump
        with:
          version: ${{ needs.prepare-release.outputs.version }}

      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
          install-zigbuild: ${{ contains(matrix.target, 'musl') }}

      - name: Build release binary (musl — static linking)
        if: contains(matrix.target, 'musl')
        run: cargo zigbuild --bin easybot --release --features "default,plugin-system" --target ${{ matrix.target }} --locked

      - name: Build release binary (native)
        if: ${{ !contains(matrix.target, 'musl') }}
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-deployment-target || '' }}
        run: cargo build --release --features "default,plugin-system" --target ${{ matrix.target }} --locked

      # ── macOS 签名 + 公证（可选，凭据存在时自动执行） ──
      - name: Check macOS signing credentials
        if: contains(matrix.target, 'apple-darwin')
        id: check-macos-cert
        env:
          CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No Apple signing certificate — macOS binary will be unsigned"
          fi

      - name: Sign and notarize macOS binary
        if: steps.check-macos-cert.outputs.available == 'true'
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER }}
        run: |
          BINARY="target/${{ matrix.target }}/release/easybot${{ matrix.suffix }}"

          # 1. 导入证书到临时 keychain
          echo "$CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import certificate.p12 -k temp.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k temp temp.keychain

          # 2. 签名（启用 Hardened Runtime）
          DEVELOPER_ID=$(security find-identity -v -p basic |
            grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          codesign --force --sign "$DEVELOPER_ID" \
            --timestamp --options runtime "$BINARY"

          # 3. 公证
          if [ -n "$NOTARY_API_KEY" ]; then
            echo "$NOTARY_API_KEY" | base64 --decode > auth_key.p8
            zip -r "$BINARY.zip" "$BINARY"
            xcrun notarytool submit "$BINARY.zip" \
              --key auth_key.p8 --key-id "$NOTARY_API_KEY_ID" \
              --issuer "$NOTARY_ISSUER" --wait
            # 4. 贴票
            xcrun stapler staple "$BINARY"
            rm -f "$BINARY.zip" auth_key.p8
          fi

          # 清理证书
          rm -f certificate.p12
          security delete-keychain temp.keychain

      - name: Prepare artifact
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/easybot${{ matrix.suffix }}"
          ARCHIVE="easybot-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$BINARY" "$ARCHIVE"
          echo "sha256=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: easybot-${{ matrix.target }}
          path: easybot-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────
  create-release:
    needs: [build-binaries, prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GH_RELEASE_PAT || github.token }}

      - uses: ./.github/actions/apply-version-bump
        with:
          version: ${{ needs.prepare-release.outputs.version }}

      - name: Clean up any previous failed release for this tag
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # 如果之前有失败的 release（tag 已存在但 release 不完整），先清理
          gh release view "v$VERSION" --json id 2>/dev/null && \
            gh release delete "v$VERSION" --yes && \
            echo "Cleaned up stale release for v$VERSION" || \
            echo "No stale release found for v$VERSION"
          git push origin --delete "v$VERSION" 2>/dev/null || true

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8

      - name: Generate checksums
        run: |
          # Collect sha256 for all platform binaries
          for dir in easybot-*-*; do
            if [ -d "$dir" ]; then
              cd "$dir" && sha256sum easybot-*-* >> ../checksums.txt && cd ..
            fi
          done

      - name: Download release body
        uses: actions/download-artifact@v8
        with:
          name: release-body
          path: .release-body

      - name: Download easybot-version.json
        uses: actions/download-artifact@v8
        with:
          name: easybot-version
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: EasyBot v${{ needs.prepare-release.outputs.version }}
          body_path: .release-body/release_body.md
          draft: false
          prerelease: ${{ contains(needs.prepare-release.outputs.version, '-') }}
          files: |
            easybot-*/easybot-*
            checksums.txt
            easybot-version.json

  # ── Build and push Docker image ────────────────────
  docker:
    needs: [prepare-release, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - uses: ./.github/actions/apply-version-bump
        with:
          version: ${{ needs.prepare-release.outputs.version }}

      - name: Download linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: easybot-x86_64-unknown-linux-musl

      - name: Download linux aarch64 binary
        uses: actions/download-artifact@v8
        with:
          name: easybot-aarch64-unknown-linux-musl

      - name: Prepare binaries for Docker
        run: |
          mkdir -p dist/
          cp easybot-x86_64-unknown-linux-musl dist/easybot-amd64
          cp easybot-aarch64-unknown-linux-musl dist/easybot-arm64
          chmod +x dist/easybot-*

      - uses: ./.github/actions/docker-setup
        id: docker-prep
        with:
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-prep.outputs.meta-tags }}
          labels: ${{ steps.docker-prep.outputs.meta-labels }}

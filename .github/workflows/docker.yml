name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: [Dockerfile, .dockerignore, Cargo.toml, Cargo.lock, "crates/**", "bin/**"]
  pull_request:
    branches: [main]
    paths: [Dockerfile, .dockerignore, Cargo.toml, Cargo.lock, "crates/**", "bin/**"]

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PR 验证：仅编译 release mode + amd64 ──
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (validation only — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha

  # ── amd64: 原生 x64 构建 ──
  build-amd64:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-setup
        id: docker-prep

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          labels: ${{ steps.docker-prep.outputs.meta-labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.docker-prep.outputs.lower-repo }},push-by-digest=true

  # ── arm64: 原生 ARM 构建（GitHub 原生 ARM runner） ──
  build-arm64:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-setup
        id: docker-prep

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          labels: ${{ steps.docker-prep.outputs.meta-labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.docker-prep.outputs.lower-repo }},push-by-digest=true

  # ── Merge: 组合 multi-arch manifest 并打标签推送 ──
  merge:
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-setup
        id: docker-prep

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${{ steps.docker-prep.outputs.lower-repo }}"
          DIGEST_AMD64="${{ needs.build-amd64.outputs.digest }}"
          DIGEST_ARM64="${{ needs.build-arm64.outputs.digest }}"
          TAGS="${{ steps.docker-prep.outputs.meta-tags }}"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest: $tag"
            docker buildx imagetools create \
              -t "$tag" \
              "${REGISTRY}/${IMAGE}@${DIGEST_AMD64}" \
              "${REGISTRY}/${IMAGE}@${DIGEST_ARM64}"
          done <<< "$TAGS"

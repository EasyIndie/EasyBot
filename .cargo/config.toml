# Cross-compilation targets for fully static Linux binaries via cargo-zigbuild.
#
# Prerequisites:
#   pip install cargo-zigbuild
#
# Build commands:
#   cargo zigbuild --target x86_64-unknown-linux-musl --release
#   cargo zigbuild --target aarch64-unknown-linux-musl --release
#   cargo zigbuild --bin easybot --target x86_64-unknown-linux-musl --features "full,plugin-system" --locked
#   cargo zigbuild --bin easybot --target aarch64-unknown-linux-musl --features "full,plugin-system" --locked --release
#
# Verify static linking:
#   file target/x86_64-unknown-linux-musl/release/easybot
#     # Expected: "ELF 64-bit LSB executable, x86-64, ... statically linked"
#   ldd target/x86_64-unknown-linux-musl/release/easybot
#     # Expected: "not a dynamic executable"
#
# NOTE: cargo-zigbuild automatically configures the C compiler and linker.
# No manual linker overrides are needed.

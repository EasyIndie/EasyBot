version: "3.9"

# EasyBot Stack
#
# Quick start:
#   cp .env.example .env     # Edit tokens
#   docker compose up -d
#   curl localhost:8080/health
#
# 启用更多适配器（以 QQ 为例）:
#   1. 复制 .env.example 为 .env，填入 token
#   2. 创建 gateway.local.yaml:
#       qq:
#         enabled: true
#         token: "${QQ_CLIENT_SECRET}"
#         extra:
#           app_id: "${QQ_APP_ID}"
#   3. 取消下方 qq service 中 local-config-volume 的注释
#   4. docker compose --profile postgres up -d
#
# For monitoring (optional):
#   docker-compose --profile monitoring up -d
#   open http://localhost:9091  # Prometheus

services:
  easybot:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./gateway.yaml:/etc/easybot/gateway.yaml:ro
      # 取消注释以启用更多适配器（创建 gateway.local.yaml 后挂载）
      # - ./gateway.local.yaml:/var/lib/easybot/gateway.local.yaml:ro
      - easybot_data:/var/lib/easybot/data
    environment:
      - EASYBOT_HOME=/var/lib/easybot
      # Pass secrets through environment — referenced via ${VAR_NAME} in gateway.yaml
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - QQ_CLIENT_SECRET=${QQ_CLIENT_SECRET:-}
      - QQ_APP_ID=${QQ_APP_ID:-}
      - WECHAT_BOT_TOKEN=${WECHAT_BOT_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: easybot
      POSTGRES_USER: easybot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybot"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - postgres
    restart: unless-stopped

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  easybot_data:
  pg_data:

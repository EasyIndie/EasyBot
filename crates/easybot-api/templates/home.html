<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="description" content="EasyBot — 统一多平台即时通讯网关，支持 Telegram、Discord、飞书、QQ、微信，提供 REST API 与 WebSocket 实时事件推送。">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EasyBot - IM Gateway</title>
<style>
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #161822;
  --bg-tertiary: #11111e;
  --border-default: #30363d;
  --border-muted: #21262d;
  --text-primary: #e6edf3;
  --text-secondary: #c9d1d9;
  --text-muted: #949da8;
  --text-faint: #6e7681;
  --accent: #58a6ff;
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-primary); color: var(--text-secondary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; overscroll-behavior: none; }
html { touch-action: manipulation; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
.container { max-width: 900px; margin: 0 auto; padding: 48px 24px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.hero { text-align: center; margin-bottom: 48px; }
.hero h1 { font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -1px; margin-bottom: 8px; }
.hero .subtitle { font-size: 18px; color: var(--text-muted); }
.cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; margin-bottom: 48px; }
.card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: 8px; padding: 24px; text-decoration: none; color: var(--text-secondary); transition: border-color 0.2s, transform 0.1s; text-align: center; }
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card .card-icon { font-size: 28px; margin-bottom: 8px; }
.card h3 { font-size: 16px; margin-bottom: 4px; color: var(--text-primary); }
.card p { font-size: 13px; color: var(--text-muted); }
footer { text-align: center; padding: 24px; color: var(--text-faint); font-size: 13px; }
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }
@media (max-width: 640px) {
  .cards { grid-template-columns: 1fr; }
  .hero h1 { font-size: 32px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>EasyBot</h1>
    <p class="subtitle">IM Gateway — 统一多平台即时通讯网关</p>
  </div>

  <div class="cards">
    <a href="/docs" class="card">
      <div class="card-icon">📖</div>
      <h3>文档中心</h3>
      <p>架构说明、API 路由、配置指南</p>
    </a>
    <a href="/admin" class="card">
      <div class="card-icon">🔧</div>
      <h3>管理后台</h3>
      <p>适配器管理、配置变更、日志查看</p>
    </a>
    <a href="/swagger" class="card">
      <div class="card-icon">📘</div>
      <h3>API 文档</h3>
      <p>OpenAPI / Swagger 在线浏览与测试</p>
    </a>
  </div>

  <footer>
    <p>EasyBot __VERSION__ &middot; <a href="https://github.com/EasyIndie/EasyBot">GitHub</a> &middot; GPL-3.0</p>
  </footer>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyBot - IM Gateway</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
.container { max-width: 900px; margin: 0 auto; padding: 48px 24px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.hero { text-align: center; margin-bottom: 48px; }
.hero h1 { font-size: 48px; font-weight: 700; color: #58a6ff; letter-spacing: -1px; margin-bottom: 8px; }
.hero .subtitle { font-size: 18px; color: #8b949e; }
.cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; margin-bottom: 48px; }
.card { background: #161822; border: 1px solid #30363d; border-radius: 8px; padding: 24px; text-decoration: none; color: #c9d1d9; transition: border-color 0.2s, transform 0.1s; text-align: center; }
.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.card .card-icon { font-size: 28px; margin-bottom: 8px; }
.card h3 { font-size: 16px; margin-bottom: 4px; color: #e6edf3; }
.card p { font-size: 13px; color: #8b949e; }
footer { text-align: center; padding: 24px; color: #484f58; font-size: 13px; }
footer a { color: #58a6ff; text-decoration: none; }
footer a:hover { text-decoration: underline; }
@media (max-width: 640px) {
  .cards { grid-template-columns: 1fr; }
  .hero h1 { font-size: 32px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>EasyBot</h1>
    <p class="subtitle">IM Gateway — 统一多平台即时通讯网关</p>
  </div>

  <div class="cards">
    <a href="/docs" class="card">
      <div class="card-icon">📖</div>
      <h3>文档中心</h3>
      <p>架构说明、API 路由、配置指南</p>
    </a>
    <a href="/admin" class="card">
      <div class="card-icon">🔧</div>
      <h3>管理后台</h3>
      <p>适配器管理、配置变更、日志查看</p>
    </a>
    <a href="/swagger" class="card">
      <div class="card-icon">📘</div>
      <h3>API 文档</h3>
      <p>OpenAPI / Swagger 在线浏览与测试</p>
    </a>
  </div>

  <footer>
    <p>EasyBot &middot; <a href="https://github.com/EasyIndie/EasyBot">GitHub</a> &middot; GPL-3.0</p>
  </footer>
</div>
</body>
</html>

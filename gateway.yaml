# EasyBot 默认配置
# 配置文件支持环境变量引用: ${VAR_NAME}
# 使用 gateway.local.yaml 覆盖本配置（不上传到版本控制）
#
# 启用适配器: 取消下面对应平台的注释，设置 enabled: true，
# 同时在 .env 中填入对应的 token/secret。

server:
  host: "127.0.0.1"
  port: 8080
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

api:
  basePath: "/api/v1"
  websocket:
    enabled: true
    maxClients: 1000
    heartbeatInterval: 30

storage:
  type: "sqlite"
  path: ""

logging:
  level: "info"
  format: "text"
  output: "stdout"

adapters:
  telegram:
    enabled: false
    # token: "${TELEGRAM_BOT_TOKEN}"

  discord:
    enabled: false
    # token: "${DISCORD_BOT_TOKEN}"

  feishu:
    enabled: false
    # token: "${FEISHU_APP_SECRET}"
    # extra:
    #   app_id: "${FEISHU_APP_ID}"

  qq:
    enabled: false
    # token: "${QQ_CLIENT_SECRET}"
    # extra:
    #   app_id: "${QQ_APP_ID}"

  wechat:
    enabled: false
    # extra:
    #   bot_token: "${WECHAT_BOT_TOKEN}"

# EasyBot 默认配置
# 配置文件支持环境变量引用: ${VAR_NAME}
# 使用 gateway.local.yaml 覆盖本配置（不上传到版本控制）
#
# 启用适配器: 设置 enabled: true，同时在 .env 中填入对应的 token/secret。
# 适配器所需的字段参考 gateway.local.yaml 模板（运行 easybot --init 生成）。

server:
  host: "127.0.0.1"
  port: 8080
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

api:
  basePath: "/api/v1"
  websocket:
    enabled: true
    maxClients: 1000
    heartbeatInterval: 30

storage:
  type: "sqlite"
  path: ""

logging:
  level: "info"
  format: "text"
  output: "stdout"

adapters:
  telegram:
    enabled: false

  discord:
    enabled: false

  feishu:
    enabled: false

  qq:
    enabled: false

  wechat:
    enabled: false
